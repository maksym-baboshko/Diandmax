<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <style>
    :root { --ring: #A8845A; }
    @media (prefers-color-scheme: dark) { :root { --ring: #d4b896; } }
  </style>

  <defs>
    <mask id="right-ring-mask" x="0" y="0" width="32" height="32" maskUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="white"/>
      <path d="M 16,10.64 A 7,7 0 0,0 16,21.36"
            stroke="black" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    </mask>
  </defs>

  <circle
    cx="20.5"
    cy="16"
    r="7"
    stroke="var(--ring)"
    stroke-width="2.5"
    mask="url(#right-ring-mask)"
  />

  <circle cx="11.5" cy="16" r="7" stroke="var(--ring)" stroke-width="2.5"/>
</svg>
