<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <style>
    :root { --bg: #FAF6F0; --ring: #A8845A; }
    @media (prefers-color-scheme: dark) { :root { --bg: #1a1614; --ring: #d4b896; } }
  </style>

  <!-- Warm background -->
  <rect width="32" height="32" rx="7" fill="var(--bg)"/>

  <!-- Right ring (drawn first — appears behind left ring at crossing) -->
  <circle cx="20.5" cy="16" r="7" stroke="var(--ring)" stroke-width="2.5"/>

  <!-- Cover left-side arc of right ring with background to create depth illusion -->
  <!-- Arc from top crossing (16, 10.64) to bottom crossing (16, 21.36), left side of right ring -->
  <path d="M 16,10.64 A 7,7 0 0,0 16,21.36"
        stroke="var(--bg)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Left ring (drawn last — appears in front) -->
  <circle cx="11.5" cy="16" r="7" stroke="var(--ring)" stroke-width="2.5"/>
</svg>
